name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate public build
        run: |
          node --test tests/*.test.mjs
          node scripts/validate-spell-matrix.mjs
          node scripts/security-audit.mjs

      - name: Prepare public site
        run: |
          mkdir -p public/assets
          cp ./*.html ./*.css ./*.js ./*.mjs public/
          cp robots.txt sitemap.xml public/
          cp -R assets/library-schematics public/assets/library-schematics
          cp -R assets/symbol-glyphs public/assets/symbol-glyphs
          cp -R vendor public/vendor
          touch public/.nojekyll

      - name: Audit public artifact
        run: node scripts/validate-public-artifact.mjs public

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
