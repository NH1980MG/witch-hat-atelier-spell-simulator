name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate JavaScript
        run: |
          node --check app.js
          node --check symbol-catalog.mjs
          node --check spell-grammar.mjs
          node scripts/validate-spell-matrix.mjs

      - name: Prepare public site
        run: |
          mkdir -p public
          cp index.html bibliotheque.html parametres.html tutoriel.html public/
          cp app.js spell-grammar.mjs symbol-catalog.mjs styles.css public/
          cp -R vendor public/vendor
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
